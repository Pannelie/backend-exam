info:
  desc: API Documentation for Airbean API
  title: Airbean API
  version: 1.0.0
openapi: 3.0.1
components:
  schemas:
    Product:
      type: object
      properties:
        prodId:
          type: string
          example: "prod-xxxxx"
        title:
          type: string
          example: "Caffe Latte"
        desc:
          type: string
          example: "Serveras varm"
        price:
          type: number
          example: 35
    ProductInput:
      type: object
      required:
        - title
        - desc
        - price
      properties:
        title:
          type: string
          example: "Caffe Latte"
        desc:
          type: string
          example: "Serveras varm"
        price:
          type: number
          example: 35
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequestError:
      desc: Bad request from client
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Missing or invalid parameters in request
    NotFoundError:
      desc: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Requested resource not found

paths:
  /api/auth/logout:
    get:
      tags:
        - Auth
      desc:
        logout for user
      responses:
        "200":
          desc: User logged out successfully
          content:
            application/json:
              schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: User logged out successfully
  /api/auth/login:
    post:
      tags: 
        - Auth
      desc:
        login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "user123"
                password:
                  type: string
                  example: "secretPassword123"
      responses:
        "200":
          desc: Response for successfull login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User logged in successfully
                  token:
                    type: string
                    example: "opJhbGciOiJIUzI1iksInR5cCI6IkpXVCJ5..."
        "400":
          desc: Login failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                  type: string
              examples:
                IncorrectPassword:
                  desc: User entered incorrect username and/or password
                  value: 
                    success: false
                    message: "Incorrect username and/or password"
                UserNotFound:
                  desc: User not found
                  value:
                    success: false
                    message: "No user found"
  /api/auth/register:
    post:
      tags: 
        - Auth
      desc:
        User registration where either "user" or "admin" is set as role in request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - role
              properties:
                username:
                  type: string
                  example: "user123"
                password:
                  type: string
                  example: "secretPassword123"
                role:
                  type: string
                  desc: Can only be user or admin
                  enum: 
                    - user
                    - admin
                  example: "admin"
      responses:
        "201":
          desc: Response for successfull registration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: New user registered successfully
                  result:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "user123"
                        ##Password bör kanske inte inkluderas i verkligt scenario, 
                        ##men inkluderar i denna uppgiften eftersom det följer med i body
                      password:
                        type: string
                        example: "password123"
                      role:
                        type: string
                        example: user
                      userId:
                        type: string
                        example: user-xxxxx
        "400":
          desc: registration failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Registration unsuccessful
  /api/menu:
    post:
      tags:
        - Menu
      desc:
        Adds new product to menu. Requires a valid token and admin access.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          desc: Product created and added to the menu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  newProduct:
                    $ref: "#/components/schemas/Product"
        "400":
          desc: Missing field in request body
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "All fields required"
        "500":
          desc: Something went wrong while creating product for menu
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Error while creating product
  /api/menu/{prodid}:
    put:
      tags:
        - Menu
      desc:
        Updates product in menu. Requires admin access and token.
      security: 
        - bearerAuth: []
      parameters: 
        - name: prodId
          in: path
          required: true
          schema:
            type: string
          desc: ID of the product to Update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          desc: Product updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  updatedProduct:
                    $ref: "#/components/schemas/Product"
        "400":
          desc: Missing fields in request
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: 
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: All fields required
        '500':
          desc: Server error. Could not update product
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Failed to update product
    delete:
      tags:
        - Menu
      desc:
        Deletes product in menu
      responses:
