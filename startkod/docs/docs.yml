info:
  description: API Documentation for Airbean API
  title: Airbean API
  version: 1.0.0
openapi: 3.0.1
components:
  schemas:
  responses:
    BadRequestError:
      description: Bad request from client
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Missing or invalid parameters in request
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: false
              message:
                type: string
                example: Requested resource not found

paths:
  /api/auth/logout:
    get:
      tags:
        - Auth
      description:
        logout for user
      responses:
        "200":
          description: User logged out successfully
          content:
            application/json:
              schema:
              type: object
              properties:
                success:
                  type: boolean
                  example: true
                message:
                  type: string
                  example: User logged out successfully
  /api/auth/login:
    post:
      tags: 
        - Auth
      description:
        login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                  example: "user123"
                password:
                  type: string
                  example: "secretPassword123"
      responses:
        "200":
          description: Response for successfull login
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: User logged in successfully
                  token:
                    type: string
                    example: "opJhbGciOiJIUzI1iksInR5cCI6IkpXVCJ5..."
        "400":
          description: Login failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                  type: string
              examples:
                IncorrectPassword:
                  description: User entered incorrect username and/or password
                  value: 
                    success: false
                    message: "Incorrect username and/or password"
                UserNotFound:
                  description: User not found
                  value:
                    success: false
                    message: "No user found"
  /api/auth/register:
    post:
      tags: 
        - Auth
      description:
        User registration where either "user" or "admin" is set as role in request body
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
                - role
              properties:
                username:
                  type: string
                  example: "user123"
                password:
                  type: string
                  example: "secretPassword123"
                role:
                  type: string
                  description: Can only be user or admin
                  enum: 
                    - user
                    - admin
                  example: "admin"
      responses:
        "201":
          description: Response for successfull registration
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: New user registered successfully
                  result:
                    type: object
                    properties:
                      username:
                        type: string
                        example: "user123"
                        ##Password bör kanske inte inkluderas i verkligt scenario, 
                        ##men inkluderar i denna uppgiften eftersom det följer med i body
                      password:
                        type: string
                        example: "password123"
                      role:
                        type: string
                        example: user
                      userId:
                        type: string
                        example: user-xxxxx
        "400":
          description: registration failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: Registration unsuccessful
  /api/menu:
    post:
      tags:
        - Menu
      description:
        Adds new product to menu
      responses:
  /api/menu/{prodid}:
    put:
      tags:
        - Menu
      description:
        Updates product in menu
      responses:
    delete:
      tags:
        - Menu
      description:
        Deletes product in menu
      responses:
